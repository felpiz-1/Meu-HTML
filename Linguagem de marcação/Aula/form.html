<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Entre em contato</h1>
<form action="">
    <p>
        <label for="Nome">nome:</label>
    <input 
    type="text"
     id="nome" 
     name="nome" 
     required placeholder="digitar seu nome"/> <!--  required é para obrigar o preenchimento do campo e placeholder é para colocar um texto dentro do campo para o usuário saber o que deve ser digitado -->
     </p>
   </p>
    <p>
    <label 
    for="telefone">Telefone:</label>
    <input type="number"
     id="telefone" 
     name="telefone" 
     required placeholder="insia seu numero"/>
</p>
<p>
    <label for="msg"></label>
    <textarea name="msg" id="msg" cols="50" rows="5" placeholder="Deixe seu comentario"></textarea>
</p>
<button type="submit">Enviar</button>







</form>















</body>
</html>
